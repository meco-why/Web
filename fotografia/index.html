<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>HexaHexa123</h2>

        <div class="kalkulacja-row">
            <div class="kol-input">
                <label>Ogniskowa (f) [mm]</label>
                <div class="input-group">
                    <input type="number" id="focal" value="20" oninput="przeliczGeometrie('focal')">
                    <span id="lock-focal" class="lock-btn locked" onclick="toggleLock('focal')" title="Zablokuj ogniskową">🔒</span>
                </div>
                <div class="optymalna-info" id="wynik-optymalna" style="margin-bottom: 15px;">Optymalna dziurka: 0.161 mm</div>
                
                <label>Dziurka (d) [mm]</label>
                <div class="input-group">
                    <input type="number" id="pinhole" value="0.2" step="0.01" oninput="przeliczGeometrie('pinhole')">
                    <span id="lock-pinhole" class="lock-btn" onclick="toggleLock('pinhole')" title="Zablokuj dziurkę">🔓</span>
                </div>
            </div>
            
            <div class="kol-wzor">
                <span>f / d = F</span>
                <div class="strzalka">↔</div>
            </div>
            
            <div class="kol-input">
                <label style="text-align: center;">Przysłona (f/)</label>
                <input type="number" id="fstop-input" value="100" oninput="przeliczGeometrie('fstop')" style="border-color: #4CAF50; border-style: dashed; font-size: 1.4em; padding: 15px; font-weight: bold;">
            </div>
            
        </div>
        

        <div class="kalkulacja-row">
            <div class="kol-input">
                <label>Wartość (EV)</label>
                <input type="number" id="ev" value="10" step="0.1" oninput="przeliczSwiatlo('ev')">
            </div>
            
            <div class="kol-wzor">
                <span>E = 2.5 * 2^EV</span>
                <div class="strzalka">↔</div>
            </div>
            
            <div class="kol-input">
                <label>Natężenie [Lux]</label>
                <input type="number" id="lux-input" value="2560" oninput="przeliczSwiatlo('lux')">
            </div>
        </div>

        <div class="kalkulacja-row" style="border-color: #4CAF50;">
            <div class="kol-input">
                <label>Parametry Papieru</label>
                <span style="color: #bbb; font-size: 0.85em;">ISO: <b>3</b> | Stała C: <b>250</b></span>
                <span style="color: #888; font-size: 0.75em; margin-top: 3px;">Schwarzschild: P=1.3 (dla > 1s)</span>
            </div>
            <div class="kol-wzor">
                <span>(F² * C) / (E * ISO)</span>
                <div class="strzalka">➔</div>
            </div>
            <div class="kol-wynik-box">
                <div class="naglowek-wyniku">Czas Ekspozycji</div>
                <div class="kol-wynik" id="wynik-czas" style="background-color: #1a3320; color: #fff; font-size: 1.3em;">-</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Geometria i Podgląd</h2>
        <label>Szerokość naświetlanego filmu (papieru) [mm]:</label>
        <input type="number" id="filmWidth" value="20" oninput="obliczWszystko()">
        <canvas id="symulacja" width="400" height="400"></canvas>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
